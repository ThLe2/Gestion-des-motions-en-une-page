<script>
    // Variable globale pour Supabase
    let supabaseClient = null;

    // Initialiser Supabase
    async function initSupabase() {
        return new Promise((resolve, reject) => {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(
                    'https://kycoxionbkjzkqbixeiw.supabase.co',
                    'sb_publishable_YSV2cvZcvpQw0qPucpuJyg_jXGJj7NZ'
                );
                resolve();
                return;
            }

            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = () => {
                supabaseClient = window.supabase.createClient(
                    'https://kycoxionbkjzkqbixeiw.supabase.co',
                    'sb_publishable_YSV2cvZcvpQw0qPucpuJyg_jXGJj7NZ'
                );
                resolve();
            };
            script.onerror = () => reject(new Error("Échec du chargement de Supabase"));
            document.head.appendChild(script);
        });
    }

    // Attendre que le DOM soit chargé
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            await initSupabase();
            console.log("Supabase initialisé avec succès");

            // Générer un user_id unique
            let userId = localStorage.getItem('userId');
            if (!userId) {
                userId = crypto.randomUUID();
                localStorage.setItem('userId', userId);
                console.log("Nouvel utilisateur :", userId);
            }

            // Sauvegarder la réponse
            document.getElementById('validerReponse6').addEventListener('click', async () => {
                const reponse = document.getElementById('reponseModule6').value.trim();
                if (!reponse) {
                    alert("Veuillez écrire une réponse.");
                    return;
                }

                const retourDiv = document.getElementById('retourModule6');
                retourDiv.innerHTML = `<p>Enregistrement en cours...</p>`;
                retourDiv.style.display = 'block';

                try {
                    if (!supabaseClient) throw new Error("Supabase non initialisé");

                    const { data, error } = await supabaseClient
                        .from('reponses')
                        .insert({ user_id: userId, module_id: 6, texte: reponse });

                    if (error) {
                        if (error.code === "42501") {
                            // Erreur RLS spécifique
                            retourDiv.className = 'retour error';
                            retourDiv.innerHTML = `
                                <p>❌ Erreur de sécurité (RLS) :</p>
                                <p>Les insertions sont bloquées par les politiques de sécurité de Supabase.</p>
                                <p>Pour résoudre ce problème :</p>
                                <ol>
                                    <li>Allez dans Supabase → Authentication → Policies.</li>
                                    <li>Sélectionnez la table "reponses".</li>
                                    <li>Désactivez RLS ou créez une politique pour autoriser les insertions.</li>
                                </ol>
                            `;
                        } else {
                            throw error;
                        }
                        return;
                    }

                    retourDiv.className = 'retour success';
                    retourDiv.innerHTML = `<p>✅ Réponse enregistrée avec succès !</p>`;
                } catch (error) {
                    console.error("Erreur complète :", error);
                    retourDiv.className = 'retour error';
                    retourDiv.innerHTML = `
                        <p>❌ Erreur : ${error.message}</p>
                        <p>Vérifiez :</p>
                        <ul>
                            <li>La connexion Internet</li>
                            <li>L'URL et la clé Supabase</li>
                            <li>Que la table 'reponses' existe</li>
                            <li>Que RLS est désactivé ou correctement configuré</li>
                        </ul>
                    `;
                }
            });
        } catch (error) {
            console.error("Erreur d'initialisation :", error);
            document.getElementById('retourModule6').innerHTML = `
                <p class="error">❌ Erreur d'initialisation : ${error.message}</p>
            `;
            document.getElementById('retourModule6').style.display = 'block';
        }
    });
</script>
