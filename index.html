<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
</head>
<body>
    <h1>Test de connexion à Supabase</h1>
    <button id="testSupabase">Tester Supabase</button>
    <div id="resultat"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.getElementById('testSupabase').addEventListener('click', async () => {
            const resultatDiv = document.getElementById('resultat');
            resultatDiv.innerHTML = "Test en cours...";

            try {
                const supabase = supabase.createClient(
                    'https://kycoxionbkjzkqbixeiw.supabase.co',
                    'sb_publishable_YSV2cvZcvpQw0qPucpuJyg_jXGJj7NZ'
                );

                // Tester une requête simple
                const { data, error } = await supabase
                    .from('reponses')
                    .select('*')
                    .limit(1);

                if (error) throw error;

                resultatDiv.innerHTML = `
                    <p style="color: green;">✅ Supabase fonctionne !</p>
                    <p>Nombre de réponses : ${data.length}</p>
                `;
            } catch (error) {
                resultatDiv.innerHTML = `
                    <p style="color: red;">❌ Erreur : ${error.message}</p>
                `;
                console.error("Erreur complète :", error);
            }
        });
    </script>
</body>
</html>
